<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — Skily Clothes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Selector de talle inline — catálogo */
    .card-size-picker {
      width: 100%;
      margin-bottom: 4px;
    }
    .card-size-label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-size-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .card-size-btn {
      min-width: 44px;
      height: 38px;
      padding: 0 10px;
      border: 2px solid var(--border-md);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-weight: 700;
      font-size: .88rem;
      cursor: pointer;
      transition: all var(--trans);
    }
    .card-size-btn:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,.08);
    }
  </style>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar navbar--scrolled" id="navbar">
    <div class="navbar__container">
      <div class="navbar__left">
        <a href="index.html" class="navbar__logo" aria-label="Skily Clothes inicio">
          <img src="imagenes/LOGO.png" alt="Skily Clothes" class="logo-img" width="42" height="42">
          <span class="logo-text">Skily <span class="accent">Clothes</span></span>
        </a>
      </div>

      <div class="navbar__center">
        <ul class="navbar__menu" id="navMenu">
          <li><a href="#" class="nav-link">FAMILIA</a></li>
          <li><a href="#" class="nav-link">EXCLUSIVIDAD</a></li>
          <li><a href="#" class="nav-link">CONTACTO</a></li>
          <li><a href="#" class="nav-link">INFO</a></li>
          <li><a href="catalogo.html" class="nav-link">TODOS LOS PRODUCTOS</a></li>
        </ul>
      </div>

      <div class="navbar__actions">
        <button class="icon-btn" id="userIcon" aria-label="Mi cuenta">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <button class="icon-btn cart-icon" id="cartIcon" aria-label="Carrito">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/>
            <path d="M2 2h4l2.7 12.4a2 2 0 0 0 2 1.6h7.6a2 2 0 0 0 2-1.6L22 6H6"/>
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>

      <button class="hamburger" id="hamburger" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ═══ CONTENIDO ═══ -->
  <div class="page-content">
    <div class="catalogo-grid" id="catalogoGrid"></div>
  </div>

  <!-- ═══ CARRITO PANEL ═══ -->
  <div class="cart-panel" id="cartPanel">
    <div class="cart-panel__header">
      <h3>Tu Carrito</h3>
      <button class="cart-panel__close" id="closeCartPanel">&times;</button>
    </div>
    <div class="cart-panel__items" id="cartItemsList">
      <p class="cart-empty">El carrito está vacío</p>
    </div>
    <div class="cart-panel__footer">
      <div class="cart-total">Total: <span id="cartTotal">$0</span></div>
      <button class="btn btn--primary cart-checkout" id="cartCheckoutBtn">Comprar por WhatsApp</button>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay"></div>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    // ── Navbar ────────────────────────────────────────────────
    (function initNavbar() {
      const navbar    = document.getElementById("navbar");
      const hamburger = document.getElementById("hamburger");
      const navMenu   = document.getElementById("navMenu");
      let lastScroll  = 0;
      window.addEventListener("scroll", () => {
        const y = window.scrollY;
        navbar.classList.toggle("navbar--scrolled", y > 50);
        navbar.classList.toggle("navbar--hidden",   y > lastScroll && y > 200);
        lastScroll = y;
      }, { passive: true });
      hamburger?.addEventListener("click", () => {
        hamburger.classList.toggle("hamburger--open");
        navMenu.classList.toggle("navbar__menu--open");
      });
      navMenu?.querySelectorAll(".nav-link").forEach(link => {
        link.addEventListener("click", () => {
          hamburger.classList.remove("hamburger--open");
          navMenu.classList.remove("navbar__menu--open");
        });
      });
    })();

    // ── Renderizar catálogo ───────────────────────────────────
    function renderCatalogo() {
      const grid = document.getElementById("catalogoGrid");

      grid.innerHTML = PRODUCTS.map(p => {
        const availableSizes = p.sizes.filter(s => s.available);
        const singleSize     = availableSizes.length === 1 ? availableSizes[0].size : null;
        const btnId          = `btn-add-${p.id}`;

        const pickerHtml = availableSizes.length > 1 ? `
          <div class="card-size-picker" id="picker-${p.id}" style="display:none;">
            <span class="card-size-label">Elegí un talle:</span>
            <div class="card-size-grid">
              ${availableSizes.map(s => `
                <button class="card-size-btn"
                        data-product-id="${p.id}"
                        data-size="${s.size}">
                  ${s.size}
                </button>`).join("")}
            </div>
          </div>` : "";

        const ctaHtml = p.stock === 0
          ? `<button class="btn btn--primary product-card__cta" disabled style="pointer-events:none;opacity:.5;">AGOTADO</button>`
          : `${pickerHtml}
             <button class="btn btn--primary product-card__cta"
                     id="${btnId}"
                     data-product-id="${p.id}"
                     data-single-size="${singleSize || ""}"
                     data-has-picker="${availableSizes.length > 1}">
               AÑADIR AL CARRITO
             </button>`;

        return `
          <article class="product-card" data-id="${p.id}">
            <div class="product-card__img-wrap">
              <a href="producto.html?id=${p.id}">
                <img class="product-card__img"
                     src="${p.image}"
                     alt="${p.name}"
                     loading="lazy"
                     onerror="this.src='imagenes/placeholder.png'">
              </a>
              ${p.stock === 0 ? '<div class="product-card__soldout-overlay"><span>SIN STOCK</span></div>' : ''}
            </div>
            <div class="product-card__body">
              <a href="producto.html?id=${p.id}" class="product-card__link">
                <h3 class="product-card__name">${p.name}</h3>
              </a>
              <p class="product-card__price">${formatPrice(p.price)}</p>
              ${ctaHtml}
            </div>
          </article>`;
      }).join("");

      // ── Eventos delegados ─────────────────────────────────
      // Botón principal
      grid.addEventListener("click", e => {
        const btn = e.target.closest(".product-card__cta");
        if (!btn || btn.disabled) return;

        const productId  = parseInt(btn.dataset.productId);
        const singleSize = btn.dataset.singleSize;
        const hasPicker  = btn.dataset.hasPicker === "true";

        if (singleSize) {
          addToCart(productId, singleSize);
        } else if (hasPicker) {
          const picker = document.getElementById(`picker-${productId}`);
          if (picker) {
            const visible = picker.style.display !== "none";
            picker.style.display = visible ? "none" : "block";
            btn.textContent = visible ? "AÑADIR AL CARRITO" : "ELEGIR TALLE ↑";
          }
        }
      });

      // Botones de talle
      grid.addEventListener("click", e => {
        const sizeBtn = e.target.closest(".card-size-btn");
        if (!sizeBtn) return;

        const productId = parseInt(sizeBtn.dataset.productId);
        const size      = sizeBtn.dataset.size; 

        addToCart(productId, size);

        const picker  = document.getElementById(`picker-${productId}`);
        const mainBtn = document.getElementById(`btn-add-${productId}`);
        if (picker)  picker.style.display = "none";
        if (mainBtn) mainBtn.textContent  = "AÑADIR AL CARRITO";
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderCatalogo();
      initCart();

      document.getElementById("userIcon")?.addEventListener("click", () => {
        showToast("Próximamente podrás gestionar tu cuenta.", "info");
      });
    });
  </script>
</body>
</html>
